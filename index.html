  login: function(email, pass) {
    if (!sb) {
      var isA = email.indexOf("admin") >= 0;

        user: {id:"m1",email:email},

          id:"m1",full_name:email.split("@")[0],

        }

    .then(function(r){
      if(r.error) throw new Error(r.error.message);
      return sb.from("profiles").select("*")
      .eq("id",r.data.user.id).single()

  getAtt: function(){
    if(!sb) return Promise.resolve(ML);

    .order("created_at",{ascending:false}).limit(50)
    .then(function(r){
      return (r.data||[]).map(function(row){
        var p = row.profiles||{};

        if(st==="success") st="Success";
        else if(st==="flagged_mock_gps") st="Flagged Mock GPS";
        else if(st==="face_mismatch") st="Face Mismatch";
        return {
          id:row.id, name:p.full_name||"?",
          avatar:(p.employee_id||"?").slice(-2).toUpperCase(),
          photo:row.photo_data||"https://picsum.photos/seed/"+row.id+"/80/80.jpg",

          location:row.latitude+", "+row.longitude,
          distance:row.distance_m||0, status:st

    });

  checkIn: function(d){
    if(!sb){
      return new Promise(function(ok){
        setTimeout(function(){ok({id:"mock"});},1500);
      });
    }
    return sb.from("attendances").insert({
      employee_id:d.eid,type:"check_in",
      latitude:d.lat,longitude:d.lng,
      distance_m:d.dist,location_name:d.loc,
      location_type:d.lt,vendor_id:d.vid||null,
      photo_data:d.photo||null,
      status:d.status||"success",
      geofence_pass:d.gf,
      device_info:{ua:navigator.userAgent.slice(0,100)}
    }).select().single().then(function(r){
      if(r.error) throw new Error(r.error.message);
      return r.data;
    });
  },
  getEmp: function(){
    if(!sb) return Promise.resolve(ME);
    return sb.from("profiles")
    .select("*,device_bindings(id,is_active)")
    .order("created_at").then(function(r){
      return (r.data||[]).map(function(p){
        var linked=false;
        var b=p.device_bindings||[];
        for(var i=0;i<b.length;i++){
          if(b[i].is_active){linked=true;break;}
        }
        return {
          id:p.employee_id||p.id,name:p.full_name,
          role:p.position,dept:p.department,
          device:linked?"Linked":"Unlinked",_uid:p.id
        };
      });
    });
  },
  addEmp: function(d){
    if(!sb) return Promise.resolve({employee_id:"E007"});
    return sb.from("profiles").insert({
      full_name:d.name,
      email:d.name.toLowerCase().replace(/\s/g,".")+"@sentinel.co",
      role:"employee",position:d.role,department:d.dept
    }).select().single().then(function(r){
      if(r.error) throw new Error(r.error.message);
      return r.data;
    });
  },
  resetDev: function(uid){
    if(!sb) return Promise.resolve();
    return sb.from("device_bindings")
    .update({is_active:false,unlinked_at:new Date().toISOString()})
    .eq("employee_id",uid).eq("is_active",true);
  },
  subAtt: function(cb){
    if(!sb) return function(){};
    var ch=sb.channel("att-live")
    .on("postgres_changes",{
      event:"INSERT",schema:"public",table:"attendances"
    },function(payload){
      var n=payload.new;
      sb.from("profiles").select("full_name,employee_id")
      .eq("id",n.employee_id).single().then(function(r){
        var p=r.data||{};
        cb({
          id:n.id,name:p.full_name||"?",
          avatar:(p.employee_id||"?").slice(-2).toUpperCase(),
          photo:n.photo_data||"https://picsum.photos/seed/"+n.id+"/80/80.jpg",
          timestamp:n.created_at,
          location:n.latitude+", "+n.longitude,
          distance:n.distance_m||0,
          status:n.status==="success"?"Success":"Flagged Mock GPS"
        });
      });
    }).subscribe();
    return function(){sb.removeChannel(ch);};
  }
};

function hav(a,b,c,d){
  var R=6371000;
  var dL=(c-a)*Math.PI/180;
  var dN=(d-b)*Math.PI/180;
  var x=Math.sin(dL/2)*Math.sin(dL/2);
  var y=Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180);
  var z=Math.sin(dN/2)*Math.sin(dN/2);
  var aa=x+y*z;
  return Math.round(R*2*Math.atan2(Math.sqrt(aa),Math.sqrt(1-aa)));
}

        ce("span",{className:"inline-flex items-center gap-1.5 text-xs font-medium text-emerald-600"},ce("span",{className:"w-2 h-2 rounded-full bg-emerald-500 animate-pulse"}),"LIVE")
      ),
      ce("div",{className:"px-6 pb-6"},
        ce("div",{className:"relative aspect-[16/10] rounded-xl bg-slate-100 dark:bg-slate-800 overflow-hidden"},
          ce("div",{className:"absolute inset-0",style:{backgroundImage:"linear-gradient(rgba(99,102,241,.12) 1px,transparent 1px),linear-gradient(90deg,rgba(99,102,241,.12) 1px,transparent 1px)",backgroundSize:"40px 40px"}}),
          ce("div",{className:"absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 w-56 h-56 rounded-full border-2 border-emerald-500 bg-emerald-500/10"}),
          ce("div",{className:"absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 w-3 h-3 rounded-full bg-indigo-600 ring-4 ring-white dark:ring-slate-900"}),
          ce("p",{className:"absolute left-1/2 top-[calc(50%+16px)] -translate-x-1/2 text-[10px] mono text-slate-500"},"HQ - "+OFF.radius+"m"),
          mapDots
        )
      )
    ),
    ce(Card,null,
      ce("div",{className:"p-6"},
        ce("h3",{className:"text-base font-semibold text-slate-900 dark:text-slate-100 mb-1"},"Verifikasi Terbaru"),
        ce("p",{className:"text-sm text-slate-500 mb-4"},logs.length+" record")
      ),
      ce("div",{className:"px-6 pb-6 space-y-3 max-h-96 overflow-y-auto"},listItems)
    )
  );
}

/* === DEVICES === */
function Devices(props){
  var emps=props.emps;
  var setEmps=props.setEmps;
  var toastCtx=props.toastCtx;
  var s1=React.useState(false);
  var addOpen=s1[0];var setAddOpen=s1[1];
  var s2=React.useState(null);
  var resetTgt=s2[0];var setResetTgt=s2[1];
  var s3=React.useState({name:"",role:"",dept:""});
  var ne=s3[0];var setNe=s3[1];

  function doReset(){
    if(!resetTgt) return;
    DB.resetDev(resetTgt._uid).then(function(){
      setEmps(function(prev){
        return prev.map(function(emp){
          if(emp.id===resetTgt.id){
            return Object.assign({},emp,{device:"Unlinked"});
          }
          return emp;
        });
      });
      toastCtx.t("Device direset untuk "+resetTgt.name);
      setResetTgt(null);
    }).catch(function(er){
      toastCtx.t("Gagal reset",{type:"error",desc:er.message});
      setResetTgt(null);
    });
  }

  function doAdd(){
    if(!ne.name) return;
    DB.addEmp(ne).then(function(res){
      var nid=res.employee_id||"E007";
      setEmps(function(prev){
        return prev.concat([{
          id:nid,name:ne.name,
          role:ne.role||"Staff",
          dept:ne.dept||"General",
          device:"Unlinked"
        }]);
      });
      toastCtx.t("Terdaftar",{desc:nid});
      setNe({name:"",role:"",dept:""});
      setAddOpen(false);
    }).catch(function(er){
      toastCtx.t("Gagal",{type:"error",desc:er.message});
    });
  }

  var empRows=emps.map(function(emp){
    var devCls=emp.device==="Linked"
      ?"bg-emerald-100 text-emerald-700 dark:bg-emerald-900/40 dark:text-emerald-300"
      :"bg-slate-200 text-slate-600";
    return ce("tr",{key:emp.id},
      ce("td",{className:"px-4 py-3 mono text-xs text-slate-500"},emp.id),
      ce("td",{className:"px-4 py-3 font-medium text-slate-900 dark:text-slate-100"},emp.name),
      ce("td",{className:"px-4 py-3 text-slate-500 hidden sm:table-cell"},emp.role),
      ce("td",{className:"px-4 py-3 text-slate-500 hidden md:table-cell"},emp.dept),
      ce("td",{className:"px-4 py-3"},
        ce("span",{className:"inline-flex items-center gap-1 text-[10px] font-semibold px-2 py-0.5 rounded-full "+devCls},
          ce(Ic,{n:"Smartphone",s:12})," "+emp.device
        )
      ),
      ce("td",{className:"px-4 py-3 text-right"},
        ce(Btn,{v:"o",sz:"sm",disabled:emp.device!=="Linked",onClick:function(){setResetTgt(emp);}},
          ce(Ic,{n:"Refresh",s:14})," Reset"
        )
      )
    );
  });

  var formExtra=ce("div",{className:"space-y-3 mb-2"},
    ce("div",{className:"space-y-1"},
      ce(Lbl,null,"Nama"),
      ce(Inp,{value:ne.name,onChange:function(ev){setNe(Object.assign({},ne,{name:ev.target.value}));},placeholder:"Rina Anggraini"})
    ),
    ce("div",{className:"grid grid-cols-2 gap-3"},
      ce("div",{className:"space-y-1"},ce(Lbl,null,"Jabatan"),ce(Inp,{value:ne.role,onChange:function(ev){setNe(Object.assign({},ne,{role:ev.target.value}));},placeholder:"Staff"})),
      ce("div",{className:"space-y-1"},ce(Lbl,null,"Dept"),ce(Inp,{value:ne.dept,onChange:function(ev){setNe(Object.assign({},ne,{dept:ev.target.value}));},placeholder:"Marketing"}))
    )
  );

  return ce("div",{className:"af"},
    ce(Card,null,
      ce("div",{className:"flex flex-col sm:flex-row items-start sm:items-center justify-between gap-3 p-6 pb-4"},
        ce("div",null,
          ce("h3",{className:"text-base font-semibold text-slate-900 dark:text-slate-100"},"Manajemen Perangkat"),
          ce("p",{className:"text-sm text-slate-500"},USE_SB?"Supabase - profiles + device_bindings":"Mock Data")
        ),
        ce(Btn,{className:"bg-indigo-600 hover:bg-indigo-500",onClick:function(){setAddOpen(true);}},
          ce(Ic,{n:"UserPlus",s:16})," Tambah"
        )
      ),
      ce("div",{className:"px-6 pb-6"},
        ce("div",{className:"overflow-x-auto"},
          ce("table",{className:"w-full text-sm"},
            ce("thead",{className:"border-b border-slate-200 dark:border-slate-800 bg-slate-50 dark:bg-slate-800/50"},
              ce("tr",null,
                ce("th",{className:"px-4 py-3 text-left text-xs font-semibold text-slate-500 uppercase"},"ID"),
                ce("th",{className:"px-4 py-3 text-left text-xs font-semibold text-slate-500 uppercase"},"Nama"),
                ce("th",{className:"px-4 py-3 text-left text-xs font-semibold text-slate-500 uppercase hidden sm:table-cell"},"Jabatan"),
                ce("th",{className:"px-4 py-3 text-left text-xs font-semibold text-slate-500 uppercase hidden md:table-cell"},"Dept"),
                ce("th",{className:"px-4 py-3 text-left text-xs font-semibold text-slate-500 uppercase"},"Device"),
                ce("th",{className:"px-4 py-3 text-right text-xs font-semibold text-slate-500 uppercase"},"Aksi")
              )
            ),
            ce("tbody",{className:"divide-y divide-slate-100 dark:divide-slate-800"},empRows)
          )
        )
      )
    ),
    ce(Modal,{open:addOpen,onClose:function(){setAddOpen(false);},
      title:"Tambah Karyawan",
      footer:ce("div",{className:"flex gap-2"},
        ce(Btn,{v:"o",onClick:function(){setAddOpen(false);}},"Batal"),
        ce(Btn,{className:"bg-indigo-600 hover:bg-indigo-500",onClick:doAdd},"Simpan")
      ),
      extra:formExtra,
      children:"Karyawan akan mendaftarkan perangkat pada login pertama."
    ),
    ce(Modal,{open:!!resetTgt,onClose:function(){setResetTgt(null);},
      title:"Reset Device Binding?",
      footer:ce("div",{className:"flex gap-2"},
        ce(Btn,{v:"o",onClick:function(){setResetTgt(null);}},"Batal"),
        ce(Btn,{className:"bg-red-600 hover:bg-red-500",onClick:doReset},"Ya, Reset")
      ),
      children:"Hapus perangkat tertaut untuk ",
        ce("b",{className:"text-slate-900 dark:text-slate-100"},resetTgt?resetTgt.name:""),
        "? Karyawan bisa daftar HP baru saat login berikutnya."
    )
  );
}

/* === 404 === */
function NoPage(){
  return ce("div",{className:"min-h-screen flex items-center justify-center bg-slate-950"},
    ce("div",{className:"text-center af"},
      ce("h1",{className:"text-7xl font-bold text-white"},"404"),
      ce("p",{className:"mt-4 text-slate-400"},"Page not found"),
      ce("div",{className:"mt-6"},
        ce(Lk,{to:"/",className:"inline-flex items-center rounded-lg bg-indigo-600 px-4 py-2 text-sm font-medium text-white"},"Go home")
      )
    )
  );
}

/* === APP ROOT === */
function App(){
  var s=React.useState(window.location.hash.slice(1)||"/");
  var path=s[0];var setPath=s[1];

  React.useEffect(function(){
    var fn=function(){
      setPath(window.location.hash.slice(1)||"/");
    };
    window.addEventListener("hashchange",fn);
    return function(){
      window.removeEventListener("hashchange",fn);
    };
  },[]);

  var page;
  if(path==="/") page=ce(Login,null);
  else if(path=="/admin") page=ce(Admin,null);
  else if(path.indexOf("/employee")===0) page=ce(EmpLayout,null);
  else page=ce(NoPage,null);

  return ce(RC.Provider,{
    value:{
      p:path,
      go:function(p){window.location.hash=p;}
    }
  },
    ce(AuthProvider,null,page,ce(ConnBadge,null)
  );
}

/* === RENDER === */
ReactDOM.createRoot(document.getElementById("root")).render(ce(App));
</script>
</body>
